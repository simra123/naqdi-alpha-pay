name: portal kubernetes deployment Pipelinee

on:
  push:
    branches:
      - development
jobs:
  build:
    runs-on: kubernetes-eks-server

    strategy:
      matrix:
        branch:
          - development

    steps:
      - name: Start CodeBuild
        run: |
          error_exit()
          {
              echo "$1" 1>&2
              exit 1
          }

          CODEBUILD_PROJECT_NAME=alpha-portal-development


          echo "Starting CodeBuild project. Project name is ${CODEBUILD_PROJECT_NAME}."

          START_RESULT=`aws codebuild start-build --project-name ${CODEBUILD_PROJECT_NAME}`
          if [ "$?" != "0" ]; then
              error_exit "Could not start CodeBuild project. Exiting."
          else
              echo "Build started successfully."
          fi

          BUILD_ID=`echo ${START_RESULT} | jq '.build.id' -r`

          BUILD_STATUS="IN_PROGRESS"
          while [ "$BUILD_STATUS" == "IN_PROGRESS" ]; do
              sleep 10
              echo "Checking build status."
              BUILD=`aws codebuild batch-get-builds --ids ${BUILD_ID}`
              BUILD_STATUS=`echo $BUILD | jq '.builds[0].buildStatus' -r`
              if [ "$BUILD_STATUS" == "IN_PROGRESS" ]; then
                  echo "Build is still in progress, waiting..."
              fi
          done

          if [ "$BUILD_STATUS" != "SUCCEEDED" ]; then
              LOG_URL=`echo $BUILD | jq '.builds[0].logs.deepLink' -r`
              error_exit "Build failed, please review job output. Logs are available at $LOG_URL."
          else
              echo "Build succeeded."
          fi
      - name: Read for deployment
        run: |
          cd /home/ubuntu/eks/alpha-portal-development
          hashcommit=$(echo "$GITHUB_SHA" | cut -c1-8)
          echo $hashcommit
          sed -i "s|image:.*|image: 396715832402.dkr.ecr.ap-southeast-1.amazonaws.com/alpha-portal-development:$hashcommit|" /home/ubuntu/eks/alpha-portal-development/deployment.yaml
      - name: Deployment
        run: |
          cd /home/ubuntu/eks/alpha-portal-development
          kubectl apply -f deployment.yaml
          echo "deployed"
          sleep 20
